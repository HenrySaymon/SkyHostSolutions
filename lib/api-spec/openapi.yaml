openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SkyHostSolutions API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: services
    description: Service catalog
  - name: testimonials
    description: Customer testimonials
  - name: contact
    description: Contact form
  - name: auth
    description: Authentication
  - name: client
    description: Client portal
  - name: admin
    description: Admin panel
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- Services ---
  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all active services
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"

  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      summary: Get a single service with related services
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceDetail"
        "404":
          description: Not found

  # --- Testimonials ---
  /testimonials:
    get:
      operationId: listTestimonials
      tags: [testimonials]
      summary: List testimonials
      responses:
        "200":
          description: Testimonials list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"

  # --- Contact ---
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  # --- Auth ---
  /auth/register:
    post:
      operationId: registerClient
      tags: [auth]
      summary: Register a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientRegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error

  /auth/login:
    post:
      operationId: loginClient
      tags: [auth]
      summary: Client login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logoutClient
      tags: [auth]
      summary: Client logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /auth/admin/login:
    post:
      operationId: loginAdmin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Admin logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResponse"
        "401":
          description: Unauthorized

  /auth/admin/logout:
    post:
      operationId: logoutAdmin
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  # --- Client Portal ---
  /client/orders:
    get:
      operationId: listClientOrders
      tags: [client]
      summary: List current client's orders
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized

  /client/invoices:
    get:
      operationId: listClientInvoices
      tags: [client]
      summary: List current client's invoices
      responses:
        "200":
          description: Invoices list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
        "401":
          description: Unauthorized

  /client/invoices/{id}:
    get:
      operationId: getClientInvoice
      tags: [client]
      summary: Get a specific invoice for the current client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "403":
          description: Forbidden
        "404":
          description: Not found

  /client/tickets:
    get:
      operationId: listClientTickets
      tags: [client]
      summary: List current client's tickets
      responses:
        "200":
          description: Tickets list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
        "401":
          description: Unauthorized
    post:
      operationId: createTicket
      tags: [client]
      summary: Open a new support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketInput"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "401":
          description: Unauthorized

  /client/tickets/{id}:
    get:
      operationId: getClientTicket
      tags: [client]
      summary: Get ticket detail with replies
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetail"
        "403":
          description: Forbidden

  /client/tickets/{id}/replies:
    post:
      operationId: replyToTicket
      tags: [client]
      summary: Add a reply to a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketReplyInput"
      responses:
        "201":
          description: Reply added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketReply"
        "401":
          description: Unauthorized

  /client/dashboard:
    get:
      operationId: getClientDashboard
      tags: [client]
      summary: Client dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDashboard"
        "401":
          description: Unauthorized

  # --- Admin ---
  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Admin dashboard stats
      responses:
        "200":
          description: Admin dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboard"
        "401":
          description: Unauthorized

  /admin/clients:
    get:
      operationId: listAdminClients
      tags: [admin]
      summary: List all clients
      responses:
        "200":
          description: Clients list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientUser"
    post:
      operationId: createAdminClient
      tags: [admin]
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientRegisterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientUser"

  /admin/clients/{id}:
    patch:
      operationId: updateAdminClient
      tags: [admin]
      summary: Update client status or details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientUser"
    delete:
      operationId: deleteAdminClient
      tags: [admin]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/services:
    get:
      operationId: listAdminServices
      tags: [admin]
      summary: List all services (including disabled)
      responses:
        "200":
          description: Services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createAdminService
      tags: [admin]
      summary: Create a service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /admin/services/{id}:
    patch:
      operationId: updateAdminService
      tags: [admin]
      summary: Update a service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteAdminService
      tags: [admin]
      summary: Delete a service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/orders:
    get:
      operationId: listAdminOrders
      tags: [admin]
      summary: List all orders
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createAdminOrder
      tags: [admin]
      summary: Create an order for a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /admin/orders/{id}:
    patch:
      operationId: updateAdminOrder
      tags: [admin]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /admin/invoices:
    get:
      operationId: listAdminInvoices
      tags: [admin]
      summary: List all invoices
      responses:
        "200":
          description: Invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createAdminInvoice
      tags: [admin]
      summary: Create an invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /admin/invoices/{id}:
    patch:
      operationId: updateAdminInvoice
      tags: [admin]
      summary: Update an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /admin/tickets:
    get:
      operationId: listAdminTickets
      tags: [admin]
      summary: List all tickets
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"

  /admin/tickets/{id}:
    get:
      operationId: getAdminTicket
      tags: [admin]
      summary: Get ticket with replies
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketDetail"
    patch:
      operationId: updateAdminTicket
      tags: [admin]
      summary: Update ticket status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /admin/tickets/{id}/replies:
    post:
      operationId: adminReplyToTicket
      tags: [admin]
      summary: Admin reply to a ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketReplyInput"
      responses:
        "201":
          description: Reply added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketReply"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessMessage:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    # --- Auth ---
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    ClientRegisterInput:
      type: object
      required: [name, email, password, phone]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: string
        company:
          type: ["string", "null"]

    AuthResponse:
      type: object
      required: [id, name, email, status]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: ["string", "null"]
        status:
          type: string

    AdminAuthResponse:
      type: object
      required: [id, username, role]
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string

    ClientUser:
      type: object
      required: [id, name, email, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string

    ClientUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        company:
          type: ["string", "null"]
        status:
          type: string

    # --- Services ---
    Service:
      type: object
      required: [id, name, slug, category, shortDescription, priceUsd, priceEur, priceInr, imageUrl, enabled]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        category:
          type: string
        shortDescription:
          type: string
        description:
          type: string
        features:
          type: array
          items:
            type: string
        priceUsd:
          type: number
        priceEur:
          type: number
        priceInr:
          type: number
        imageUrl:
          type: string
        enabled:
          type: boolean

    ServiceDetail:
      type: object
      required: [service, relatedServices]
      properties:
        service:
          $ref: "#/components/schemas/Service"
        relatedServices:
          type: array
          items:
            $ref: "#/components/schemas/Service"

    ServiceInput:
      type: object
      required: [name, slug, category, shortDescription, description, priceUsd, priceEur, priceInr, imageUrl]
      properties:
        name:
          type: string
        slug:
          type: string
        category:
          type: string
        shortDescription:
          type: string
        description:
          type: string
        features:
          type: array
          items:
            type: string
        priceUsd:
          type: number
        priceEur:
          type: number
        priceInr:
          type: number
        imageUrl:
          type: string
        enabled:
          type: boolean

    ServiceUpdate:
      type: object
      properties:
        name:
          type: string
        shortDescription:
          type: string
        description:
          type: string
        features:
          type: array
          items:
            type: string
        priceUsd:
          type: number
        priceEur:
          type: number
        priceInr:
          type: number
        imageUrl:
          type: string
        enabled:
          type: boolean

    # --- Testimonials ---
    Testimonial:
      type: object
      required: [id, name, company, rating, review, avatarUrl]
      properties:
        id:
          type: integer
        name:
          type: string
        company:
          type: string
        rating:
          type: integer
        review:
          type: string
        avatarUrl:
          type: string

    # --- Contact ---
    ContactInput:
      type: object
      required: [name, email, subject, message]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        subject:
          type: string
        message:
          type: string

    # --- Orders ---
    Order:
      type: object
      required: [id, clientId, serviceId, status, amount, currency, createdAt]
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: ["string", "null"]
        serviceId:
          type: integer
        serviceName:
          type: ["string", "null"]
        status:
          type: string
        notes:
          type: ["string", "null"]
        amount:
          type: number
        currency:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    OrderInput:
      type: object
      required: [clientId, serviceId, amount, currency]
      properties:
        clientId:
          type: integer
        serviceId:
          type: integer
        notes:
          type: ["string", "null"]
        amount:
          type: number
        currency:
          type: string

    OrderUpdate:
      type: object
      properties:
        status:
          type: string
        notes:
          type: ["string", "null"]

    # --- Invoices ---
    Invoice:
      type: object
      required: [id, clientId, orderId, amount, currency, status, dueDate, createdAt]
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        clientId:
          type: integer
        clientName:
          type: ["string", "null"]
        orderId:
          type: ["integer", "null"]
        amount:
          type: number
        currency:
          type: string
        status:
          type: string
        dueDate:
          type: string
        paidAt:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    InvoiceInput:
      type: object
      required: [clientId, amount, currency, dueDate]
      properties:
        clientId:
          type: integer
        orderId:
          type: ["integer", "null"]
        amount:
          type: number
        currency:
          type: string
        dueDate:
          type: string
        notes:
          type: ["string", "null"]

    InvoiceUpdate:
      type: object
      properties:
        status:
          type: string
        dueDate:
          type: string
        paidAt:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    # --- Tickets ---
    Ticket:
      type: object
      required: [id, clientId, subject, status, priority, createdAt]
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: ["string", "null"]
        subject:
          type: string
        status:
          type: string
        priority:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string

    TicketInput:
      type: object
      required: [subject, message, priority]
      properties:
        subject:
          type: string
        message:
          type: string
        priority:
          type: string

    TicketUpdate:
      type: object
      properties:
        status:
          type: string
        priority:
          type: string

    TicketReply:
      type: object
      required: [id, ticketId, message, isAdmin, createdAt]
      properties:
        id:
          type: integer
        ticketId:
          type: integer
        authorName:
          type: string
        message:
          type: string
        isAdmin:
          type: boolean
        createdAt:
          type: string

    TicketReplyInput:
      type: object
      required: [message]
      properties:
        message:
          type: string

    TicketDetail:
      type: object
      required: [ticket, replies]
      properties:
        ticket:
          $ref: "#/components/schemas/Ticket"
        replies:
          type: array
          items:
            $ref: "#/components/schemas/TicketReply"

    # --- Dashboards ---
    ClientDashboard:
      type: object
      required: [totalOrders, activeOrders, openTickets, unpaidInvoices, recentOrders, recentTickets]
      properties:
        totalOrders:
          type: integer
        activeOrders:
          type: integer
        openTickets:
          type: integer
        unpaidInvoices:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        recentTickets:
          type: array
          items:
            $ref: "#/components/schemas/Ticket"

    AdminDashboard:
      type: object
      required: [totalClients, totalOrders, activeOrders, openTickets, totalRevenue, recentOrders, recentTickets, ordersByStatus, revenueByMonth]
      properties:
        totalClients:
          type: integer
        totalOrders:
          type: integer
        activeOrders:
          type: integer
        openTickets:
          type: integer
        totalRevenue:
          type: number
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        recentTickets:
          type: array
          items:
            $ref: "#/components/schemas/Ticket"
        ordersByStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        revenueByMonth:
          type: array
          items:
            $ref: "#/components/schemas/MonthRevenue"

    StatusCount:
      type: object
      required: [status, count]
      properties:
        status:
          type: string
        count:
          type: integer

    MonthRevenue:
      type: object
      required: [month, revenue]
      properties:
